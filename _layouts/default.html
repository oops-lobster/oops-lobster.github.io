<!doctype html>
<html lang="{{ site.lang | default: 'ko-KR' }}">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.title != 'Home' %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: page.summary | default: site.description | strip_html | escape }}"><meta name="theme-color" content="#fafafa">
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}"><meta property="og:description" content="{{ page.description | default: page.summary | default: site.description | strip_html | escape }}"><meta property="og:type" content="{% if page.collection == 'reviews' %}article{% else %}website{% endif %}"><meta property="og:url" content="{{ page.url | absolute_url }}"><meta property="og:image" content="{{ '/public/og.png' | absolute_url }}"><meta property="og:image:width" content="1731"><meta property="og:image:height" content="909"><meta name="twitter:card" content="summary_large_image"><meta name="twitter:image" content="{{ '/public/og.png' | absolute_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&amp;family=Noto+Sans+KR:wght@400;500;600;700&amp;family=Space+Grotesk:wght@400;500;600&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <a class="skip-link" href="#content">본문으로 건너뛰기</a>
  <header class="site-header">
    <a class="wordmark" href="{{ '/' | relative_url }}" aria-label="Raymin Notes 홈"><span class="wordmark-mark" aria-hidden="true">R</span><span>Raymin Notes</span></a>
    <nav aria-label="주요 메뉴"><a href="{{ '/' | relative_url }}"{% if page.url == '/' %} aria-current="page"{% endif %}>Home</a><a href="{{ '/reviews/' | relative_url }}"{% if page.url contains '/reviews/' %} aria-current="page"{% endif %}>Paper Reviews</a><a href="{{ '/resume/' | relative_url }}"{% if page.url contains '/resume/' %} aria-current="page"{% endif %}>Resume</a></nav>
  </header>
  <main id="content">{{ content }}</main>
  <footer class="site-footer"><div><span class="footer-title">Raymin Notes</span><p>Questions become notes.<br>Notes become things.</p></div><div class="footer-links"><a href="mailto:muyahomin06@snu.ac.kr">Email</a><a href="https://github.com/oops-lobster">GitHub</a><a href="{{ '/reviews/' | relative_url }}">Paper Reviews</a></div><p class="copyright">© {{ 'now' | date: '%Y' }} Minsung “Raymin” Jon</p></footer>
</body>
</html>
